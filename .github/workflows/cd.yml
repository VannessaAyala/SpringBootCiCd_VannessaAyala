name: CD - Deploy to Render

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate deploy version
        run: |
          VERSION="${GITHUB_RUN_NUMBER}-${GITHUB_SHA:0:7}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Insert version into application.yml
        run: |
          sed -i "s/app.version:.*/app.version: ${APP_VERSION}/" src/main/resources/application.yml
          echo "New version applied: ${APP_VERSION}"

      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}